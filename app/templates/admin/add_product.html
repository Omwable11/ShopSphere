{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Add Product</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea
                name="description"
                class="form-control"
                rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input
                type="number"
                step="0.01"
                name="price"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input
                type="number"
                name="stock"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>

            <select
                name="category"
                class="form-select">

                {% for category in categories %}

                <option value="{{ category.id }}">
                    {{ category.name }}
                </option>

                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Product Image</label>

            <input
                type="file"
                name="image"
                class="form-control"
                accept=".jpg,.jpeg,.png,.gif">
        </div>

        <button
            type="submit"
            class="btn btn-success">
            Add Product
        </button>

        <a href="{{ url_for('admin_dashboard') }}"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
