<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSphere</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/"> 🛒 ShopSphere </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/products">Products</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/cart">Cart</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/login">Login</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('cart') }}"> 🛒 Cart </a>
            </li>

            {% if session.get("user_id") %}

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('admin_dashboard') }}">
                Admin
              </a>
            </li>

            ... {% endif %}

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('register') }}">
                Register
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('login') }}"> Login </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('orders') }}"> My Orders </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('wishlist') }}">
                Wishlist
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
