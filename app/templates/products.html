{% extends "base.html" %} {% block content %}
<form method="GET" class="row mb-4">
  <div class="col-md-4">
    <input
      type="text"
      name="search"
      class="form-control"
      placeholder="Search Products..."
      value="{{ search }}"
    />
  </div>

  <div class="col-md-3">
    <select name="category" class="form-select">
      <option value="">All Categories</option>

      {% for cat in categories %}

      <option
        value="{{ cat.id }}"
        {%
        if
        category=""
        ="cat.id|string"
        %}
        selected
        {%
        endif
        %}
      >
        {{ cat.name }}
      </option>

      {% endfor %}
    </select>
  </div>

  <div class="col-md-3">
    <select name="sort" class="form-select">
      <option value="">Sort By</option>

      <option value="low" {% if sort="" ="low" %} selected {% endif %}>
        Price Low → High
      </option>

      <option value="high" {% if sort="" ="high" %} selected {% endif %}>
        Price High → Low
      </option>
    </select>
  </div>

  <div class="col-md-2">
    <button class="btn btn-primary w-100">Search</button>
  </div>
</form>

<h2 class="mb-4">Products</h2>

<div class="row">
  {% for product in products %}

  <div class="col-md-3 mb-4">
    <div class="card h-100 shadow-sm">
      <a href="{{ url_for('product_detail', product_id=product.id) }}">
        {% if product.image %}

        <img
          src="{{ url_for('static', filename='uploads/' ~ product.image) }}"
          class="card-img-top"
          alt="{{ product.name }}"
          style="height: 250px; object-fit: cover"
        />

        {% else %}

        <img
          src="{{ url_for('static', filename='images/no-image.png') }}"
          class="card-img-top"
          alt="No Image"
          style="height: 250px; object-fit: cover"
        />

        {% endif %}
      </a>

      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ product.name }}</h5>

        <h4 class="text-success">₹{{ product.price }}</h4>

        <div class="mt-auto">
          <a
            href="{{ url_for('product_detail', product_id=product.id) }}"
            class="btn btn-outline-primary w-100 mb-2"
          >
            View Details
          </a>

          <a
            href="{{ url_for('add_to_cart', product_id=product.id) }}"
            class="btn btn-primary w-100"
          >
            Add to Cart
          </a>

          <a
            href="{{ url_for('add_to_wishlist', product_id=product.id) }}"
            class="btn btn-outline-danger w-100 mt-2"
          >
            ❤️ Add to Wishlist
          </a>
          
        </div>
      </div>
    </div>
  </div>

  {% endfor %}
</div>

{% endblock %}
